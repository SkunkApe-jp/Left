name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'
        
    - name: Install dependencies
      working-directory: ./desktop
      run: npm install
      
    - name: Build for ${{ matrix.os }}
      working-directory: ./desktop
      run: |
        case "${{ matrix.os }}" in
          ubuntu-latest)
            npm run build_linux
            ;;
          windows-latest)
            npm run build_win
            ;;
          macos-latest)
            npm run build_osx
            ;;
        esac
      shell: bash
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Left-${{ matrix.os }}
        path: |
          ~/Documents/Left-*/
          ${{ env.HOME }}/Documents/Left-*/
          
  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          Left-ubuntu-latest/**/*
          Left-windows-latest/**/*
          Left-macos-latest/**/*
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
